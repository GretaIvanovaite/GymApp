<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GymStack — Add a new exercise to your library" />
  <title>GymStack — Add Exercise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="add-exercise-page">

<div class="app-shell">

  <!-- Top Header -->
  <header class="page-header" role="banner">
    <div class="page-header__inner">
      <a href="index.html" class="page-header__back" aria-label="Back to dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15,18 9,12 15,6"/>
        </svg>
      </a>
      <h1 class="page-header__title">New Exercise</h1>
      <div style="width: 36px;"></div><!-- spacer to centre title -->
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content" id="main-content">

    <form id="exercise-form" novalidate>

      <!-- ── Exercise Name ─────────────────────────────────────────────── -->
      <div class="form-group">
        <label class="form-label" for="ex-name">Exercise Name <span aria-hidden="true" style="color:#FF3E3E">*</span></label>
        <input
          class="form-control"
          type="text"
          id="ex-name"
          name="name"
          placeholder="e.g. Barbell Squat"
          required
          autocomplete="off"
          maxlength="60"
        />
      </div>

      <!-- ── Description ──────────────────────────────────────────────── -->
      <div class="form-group">
        <label class="form-label" for="ex-description">Description</label>
        <textarea
          class="form-control"
          id="ex-description"
          name="description"
          placeholder="Technique notes, coaching cues, or any useful context…"
          rows="3"
          maxlength="400"
        ></textarea>
      </div>

      <!-- ── Exercise Type ─────────────────────────────────────────────── -->
      <div class="form-group">
        <fieldset>
          <legend class="form-label">Exercise Type <span aria-hidden="true" style="color:#FF3E3E">*</span></legend>
          <div class="type-selector" role="radiogroup" aria-label="Exercise type">

            <input class="type-selector__option" type="radio" name="type" id="type-weights" value="weights" checked />
            <label class="type-selector__label" for="type-weights">🏋️ Weights</label>

            <input class="type-selector__option" type="radio" name="type" id="type-cardio" value="cardio" />
            <label class="type-selector__label" for="type-cardio">🏃 Cardio</label>

            <input class="type-selector__option" type="radio" name="type" id="type-hiit" value="hiit" />
            <label class="type-selector__label" for="type-hiit">⚡ HIIT</label>

            <input class="type-selector__option" type="radio" name="type" id="type-calisthenics" value="calisthenics" />
            <label class="type-selector__label" for="type-calisthenics">💪 Calisthenics</label>

          </div>
        </fieldset>
      </div>

      <!-- ── Conditional Metric Sections ──────────────────────────────── -->

      <!-- WEIGHTS -->
      <section class="metric-section" id="metrics-weights" aria-label="Weights metrics">
        <p class="metric-section__title">Weights Metrics</p>
        <div class="form-row form-row--3">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" for="w-sets">Sets</label>
            <input class="form-control" type="number" id="w-sets" name="sets"
              placeholder="4" min="1" max="99" data-required />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" for="w-reps">Reps</label>
            <input class="form-control" type="number" id="w-reps" name="reps"
              placeholder="10" min="1" max="999" data-required />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" for="w-weight">Weight (kg)</label>
            <input class="form-control" type="number" id="w-weight" name="weight"
              placeholder="80" min="0" max="9999" step="0.5" />
          </div>
        </div>
      </section>

      <!-- CARDIO -->
      <section class="metric-section" id="metrics-cardio" style="display:none;" aria-label="Cardio metrics">
        <p class="metric-section__title">Cardio Metrics</p>
        <div class="form-group" style="margin-bottom: 16px;">
          <label class="form-label" for="c-duration">Duration (minutes)</label>
          <input class="form-control" type="number" id="c-duration" name="duration"
            placeholder="30" min="1" max="600" data-required />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label class="form-label" for="c-intensity" style="margin:0">Intensity (1–10)</label>
            <span id="c-intensity-display" style="font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:800; color:#00FFCC;">5</span>
          </div>
          <input
            type="range"
            id="c-intensity"
            name="intensity"
            min="1" max="10" value="5" step="1"
            style="width:100%; accent-color:#00FFCC; cursor:pointer;"
            data-required
          />
          <div style="display:flex; justify-content:space-between; margin-top:4px;">
            <span style="font-size:0.7rem; color:#555; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;">Easy</span>
            <span style="font-size:0.7rem; color:#555; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;">Max Effort</span>
          </div>
        </div>
      </section>

      <!-- HIIT -->
      <section class="metric-section" id="metrics-hiit" style="display:none;" aria-label="HIIT metrics">
        <p class="metric-section__title">HIIT Metrics</p>
        <div class="form-row" style="margin-bottom: 16px;">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" for="h-work">Work (seconds)</label>
            <input class="form-control" type="number" id="h-work" name="workInterval"
              placeholder="30" min="1" max="600" data-required />
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label" for="h-rest">Rest (seconds)</label>
            <input class="form-control" type="number" id="h-rest" name="restInterval"
              placeholder="30" min="0" max="600" data-required />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label" for="h-rounds">Rounds</label>
          <input class="form-control" type="number" id="h-rounds" name="rounds"
            placeholder="10" min="1" max="99" data-required />
        </div>
      </section>

      <!-- CALISTHENICS -->
      <section class="metric-section" id="metrics-calisthenics" style="display:none;" aria-label="Calisthenics metrics">
        <p class="metric-section__title">Calisthenics Metrics</p>
        <div class="form-group" style="margin-bottom: 16px;">
          <label class="form-label" for="cal-sets">Sets</label>
          <input class="form-control" type="number" id="cal-sets" name="cal_sets"
            placeholder="3" min="1" max="99" data-required />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="toggle" for="cal-failure">
            <input class="toggle__input" type="checkbox" id="cal-failure" name="repsToFailure" />
            <span class="toggle__track" aria-hidden="true"></span>
            <span class="toggle__label">Reps to Failure</span>
          </label>
        </div>
      </section>

      <!-- ── Media URL ─────────────────────────────────────────────────── -->
      <div class="form-group" style="margin-top: 8px;">
        <label class="form-label" for="media-url">Media URL <span class="text-muted" style="font-weight:400; text-transform:none; letter-spacing:0">(image or video)</span></label>
        <input
          class="form-control"
          type="url"
          id="media-url"
          name="mediaUrl"
          placeholder="https://example.com/exercise.jpg"
          autocomplete="off"
        />
      </div>

      <!-- Media preview -->
      <div class="media-preview" id="media-preview" aria-label="Media preview" style="margin-bottom: 24px;">
        <span class="media-preview__icon" aria-hidden="true">🖼️</span>
        <span class="media-preview__label">Preview will appear here</span>
      </div>

      <!-- ── Save Button ───────────────────────────────────────────────── -->
      <div class="save-bar">
        <button type="submit" class="btn btn--primary btn--full" id="save-btn">
          Save Exercise
        </button>
      </div>

    </form>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="bottom-nav__item" aria-label="Dashboard">
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Home</span>
    </a>
    <a href="add-exercise.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page" aria-label="Add exercise">
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Add</span>
    </a>
    <a href="create-workout.html" class="bottom-nav__item" aria-label="Create workout">
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Workout</span>
    </a>
  </nav>

</div><!-- /.app-shell -->

<!-- Scripts (storage must load first) -->
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script src="js/form-logic.js"></script>

</body>
</html>

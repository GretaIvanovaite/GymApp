<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GymApp — Your digital workout planner" />
  <title>GymApp — Dashboard</title>
  <script src="js/storage.js" defer></script>
  <script src="js/main.js" defer></script> 
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<div class="app-shell">

  <!-- Top Header -->
  <header class="page-header" role="banner">
    <div class="page-header_inner">
      <span class="page-header_logo">Gym<span>App</span></span>
      <nav class="page-header_actions" aria-label="Header actions">
        <a href="book-consultation.html" class="btn btn--ghost-neon btn--sm" aria-label="Book a consultation">
          Book consultation
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content" id="main-content">

    <!-- Hero Greeting -->
    <section class="dashboard_hero" aria-label="Greeting">
      <h1 class="dashboard_headline">
        Let's get to the
        <span id="js-headline-accent">gym</span>
      </h1>
    </section>

    <!-- Quick Actions -->
    <section style="padding: 0 16px; margin-top: 32px;" aria-label="Quick actions">
      <h2 class="section_title" style="margin-bottom: 12px;">Quick actions</h2>
      <div class="quick-actions">
        <a href="add-exercise.html" class="quick-actions_item" aria-label="Add new exercise">
          <div class="quick-actions_icon" style="background: rgba(0,255,204,0.1); color: #00FFCC;">🏋️</div>
          <span class="quick-actions_text">New Exercise</span>
        </a>
        <a href="create-workout.html" class="quick-actions_item" aria-label="Create new workout">
          <div class="quick-actions_icon" style="background: rgba(255,184,48,0.1); color: #FFB830;">📋</div>
          <span class="quick-actions_text">New Workout</span>
        </a>
      </div>
    </section>

     <!-- Workout Schedule -->
    <section style="padding: 0 16px; margin-top: 32px;" aria-label="Workout schedule">
      <div class="section_header">
        <h2 class="section_title">Schedule</h2>
        <a href="create-workout.html" class="section_action" aria-label="Create new workout">+ Create</a>
      </div>
      <div class="card-stack" id="workout-list" role="list">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Exercise Library -->
    <section style="padding: 0 16px; margin-top: 32px;" aria-label="Exercise library">
      <div class="section_header">
        <h2 class="section_title">Exercise Library</h2>
        <a href="add-exercise.html" class="section_action" aria-label="Add new exercise">+ Add</a>
      </div>
      <div class="card-stack" id="exercise-list" role="list">
        <!-- Rendered by JS -->
      </div>
    </section>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="bottom-nav_item bottom-nav_item--active" aria-current="page" aria-label="Dashboard">
      <span class="bottom-nav_icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span class="bottom-nav_label">Home</span>
    </a>
    <a href="add-exercise.html" class="bottom-nav_item" aria-label="Add exercise">
      <span class="bottom-nav_icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </span>
      <span class="bottom-nav_label">Add</span>
    </a>
    <a href="create-workout.html" class="bottom-nav_item" aria-label="Create workout">
      <span class="bottom-nav_icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="bottom-nav_label">Workout</span>
    </a>
  </nav>

</div>


</body>
</html>

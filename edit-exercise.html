<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GymApp — Edit exercise" />
  <title>GymApp — Edit Exercise</title>
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="assets/x-icon" href="assets/favicon.ico">
</head>
<body>

  <header role="banner">
    <a href="index.html">GymApp</a>
    <a href="book-consultation.html" class="booking">Book consultation</a>
  </header>

  <main id="main-content">
    <section>
      <h1>Edit exercise</h1>
    </section>

    <form id="create_exercise">

      <label for="exercise_name">Exercise name</label>
      <input type="text" id="exercise_name" name="exercise_name" value="Pull ups" required>

      <label for="type">Type</label>
      <select id="type" name="type">
        <option value="calisthenics" selected>Calisthenics</option>
        <option value="strength">Strength</option>
        <option value="cardio">Cardio</option>
        <option value="core">Core</option>
        <option value="mobility">Mobility</option>
      </select>

      <label for="sets">Sets</label>
      <input type="number" id="sets" name="sets" value="3" min="1" max="20">

      <label for="reps">Reps</label>
      <input type="number" id="reps" name="reps" value="10" min="1" max="100">

      <label for="notes">Notes</label>
      <input type="text" id="notes" name="notes" placeholder="Any notes...">

      <input type="submit" value="Save">

    </form>
  </main>

  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="add-exercise.html">Add exercise</a>
    <a href="create-workout.html">Add workout</a>
  </nav>

</body>
</html>
